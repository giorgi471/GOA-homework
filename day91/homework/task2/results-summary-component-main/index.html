<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>



  <div class="card">

    <div class="left">

      <h2>Your Result</h2>

      <div class="circle">
        <h1>76</h1>
        <p>of 100</p>
      </div>

      <h3>Great</h3>

      <p class="text">
        You scored higher than 65% of the people who have taken these tests.
      </p>

    </div>


    <div class="right">

      <h2>Summary</h2>

      <div class="item reaction">
        <img src="assets/images/icon-reaction.svg" alt="">
        <span>Reaction</span>
        <div class="numbers">
          <span class="black">80</span>
          <span class="gray">/ 100</span>
        </div>
      </div>

      <div class="item memory">
        <img src="assets/images/icon-memory.svg" alt="">
        <span>Memory</span>
        <div class="numbers">
          <span class="black">92</span>
          <span class="gray">/ 100</span>
        </div>
      </div>

      <div class="item verbal">
          <img src="assets/images/icon-verbal.svg" alt="">
        <span>Verbal</span>
        <div class="numbers">
          <span class="black">61</span>
          <span class="gray">/ 100</span>
        </div>
      </div>

      <div class="item visual">
        <img src="assets/images/icon-visual.svg" alt="">
        <span>Visual</span>
        <div class="numbers">
          <span class="black">73</span>
          <span class="gray">/ 100</span>
        </div>
      </div>

      <button>Continue</button>

    </div>

  </div>






















  <!-- Your Result

  Verbal
  61 / 100

  Visual

  Continue -->


</body>

</html>
